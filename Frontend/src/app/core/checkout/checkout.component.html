<div class="container-lg my-5">
  <app-go-back-button></app-go-back-button>
  <form [formGroup]="checkoutForm" (ngSubmit)="onSubmit()">
    <div class="row">
      <div class="col-md-8 col-12">
        <app-ship-address
          [form]="checkoutForm"
          [listOfAddresses]="listOfAddresses"
        ></app-ship-address>
        <app-bill-address
          [form]="checkoutForm"
          [listOfAddresses]="listOfAddresses"
        ></app-bill-address>
        <app-ship-method
          [form]="checkoutForm"
          (select)="onSelectShipMethod($event)"
        ></app-ship-method>
      </div>
      <div class="col-md-4 col-12">
        <div class="card mt-3">
          <div class="card-body">
            <h3>Riepilogo ordine</h3>
            <div class="my-3">
              <div class="vstack gap-2">
                @if (cartItems.length === 0) {
                <div>Nessun articolo a carrello</div>
                }
                <div *ngFor="let item of cartItems" class="hstack">
                  <div class="pe-2">
                    {{ item.productName }} <span>x{{ item.quantity }}</span>
                  </div>
                  <div class="ms-auto">{{ item.totalPrice }}$</div>
                </div>
              </div>
              <hr />
              <div class="my-3 vstack gap-2">
                <div class="hstack">
                  <div>Imponibile</div>
                  <div class="ms-auto">{{ subtotal | currency }}</div>
                </div>
                <div class="hstack">
                  <div>Spedizione</div>
                  <div class="ms-auto">{{ shippingCost | currency }}</div>
                </div>
                <div class="hstack">
                  <div>Tasse</div>
                  <div class="ms-auto">{{ taxAmount | currency }}</div>
                </div>
              </div>
              <hr />
              <div class="hstack my-3 fw-semibold fs-5">
                <div>Totale</div>
                <div class="ms-auto">{{ totalDue | currency }}</div>
              </div>
              <div class="d-grid">
                <button
                  class="button btn btn-success d-flex justify-content-center"
                  type="submit"
                  [disabled]="!checkoutForm.valid"
                >
                  <div class="pe-2"><i class="bi bi-lock-fill"></i></div>
                  <div>Paga ora</div>
                </button>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </form>
</div>
