<div class="container-fluid bg-green-50-custom">
  <div class="row">
    <div class="col-12 d-flex justify-content-center align-items-center">
      <h2 class="text-center mt-4">Benvenuto in RideWild</h2>
    </div>
    <div class="col-12">
      <p class="text-center">Inserisci il codice inviato nella email</p>
    </div>
  </div>
</div>

<div class="auth-content bg-green-50-custom">
  <ng-container >
    <div class="container mb-5">
      <div class="row">
        <div class="mt-3 col-12 d-flex justify-content-center align-items-center ">
          <div class="card shadow-sm p-4" style="min-width: 320px; max-width: 400px; width: 100%;">
            <h2 class="text-start mb-4">AUTENTICAZIONE MFA</h2>
            <form [formGroup]="mfaForm" (ngSubmit)="onMfaSubmit()">
              <div class="mb-3">
                <label for="mfaCode" class="form-label">Codice MFA</label>
                <input
                  type="text"
                  class="form-control"
                  id="mfaCode"
                  formControlName="code"
                  [class.is-invalid]="mfaForm.get('mfaCode')?.invalid && mfaForm.get('mfaCode')?.touched"
                >
                @if (mfaForm.get('mfaCode')?.invalid && mfaForm.get('mfaCode')?.touched) {
                    <div class="text-danger mt-1">
                         <small>Il codice MFA è obbligatorio.</small>
                    </div>
                }
                
              </div>
              <button type="submit" class="btn btn-success w-100">Accedi</button>
            </form>
          </div>
        </div>
      </div>
    </div>
  </ng-container>

  
</div>
