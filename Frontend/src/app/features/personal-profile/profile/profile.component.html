
<div>
    <h3>Profilo</h3>
    <p class="text-muted">Informazioni Personali</p>
    <hr class="my-4">
    
    <form *ngIf="form" [formGroup]="form" (ngSubmit)="onSubmit()">
        <div class="row g-3"> <div class="col-md-6"> <label for="profileFirstName" class="form-label">Nome</label>
            <input type="text" class="form-control" id="profileFirstName"  formControlName="firstName">
        </div>
            <div class="col-md-6">
                <label for="profileLastName" class="form-label">Cognome</label>
                <input type="text" class="form-control" id="profileLastName"formControlName="lastName">
            </div>
        </div>
        <br>
        <div class="form-group">
            <label for="profileSuffix">Titolo</label>
            <input type="text" class="form-control" id="profileSuffix" formControlName="suffix">
        </div>
        <br>
         <div class="form-group">
            <label for="profileCompanyName">Nome Compagnia</label>
            <input type="text" class="form-control" id="profileCompanyName"   formControlName="companyName">
        </div>
        <br>
        <button type="submit" class="btn btn-success">Salva modifiche</button>
    </form>

</div>
