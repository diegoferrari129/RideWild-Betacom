<div>
  <h3 class="mb-4">Payment Methods</h3>

  <div class="mb-5">
    <div class="d-flex justify-content-between align-items-center mb-3">
      <h4 class="mb-0 h5">Saved Cards</h4>
      <button type="button" class="btn btn-primary btn-sm" >
        <i class="fas fa-plus mr-2"></i>Add New Card
      </button>
    </div>

    <div class="row">
      <div class="col-md-6 mb-3">
        <div class="card shadow-sm">
          <div class="card-body">
            <div class="d-flex justify-content-between align-items-start">
              <div>
                <h5 class="card-title mb-1">
                  <i class="fab fa-cc-visa fa-2x mr-2 text-primary"></i> Visa **** **** **** 1234
                </h5>
                <p class="card-text text-muted small mb-1">Expires: 12/26</p>
                <p class="card-text text-muted small">John M. Doe</p>
              </div>
              <span class="badge badge-success mt-1">Default</span>
            </div>
            <hr class="my-2">
            <div class="text-right">
              <button type="button" class="btn btn-sm btn-outline-secondary mr-2">Edit</button>
              <button type="button" class="btn btn-sm btn-outline-danger">Delete</button>
            </div>
          </div>
        </div>
      </div>

      <div class="col-md-6 mb-3">
        <div class="card shadow-sm">
          <div class="card-body">
            <div class="d-flex justify-content-between align-items-start">
              <div>
                <h5 class="card-title mb-1">
                  <i class="fab fa-cc-mastercard fa-2x mr-2 text-danger"></i> Mastercard **** **** **** 5678
                </h5>
                <p class="card-text text-muted small mb-1">Expires: 03/25</p>
                <p class="card-text text-muted small">Jane M. Doe</p>
              </div>
            </div>
            <hr class="my-2">
            <div class="text-right">
              <button type="button" class="btn btn-sm btn-outline-primary mr-2">Set as Default</button>
              <button type="button" class="btn btn-sm btn-outline-secondary mr-2">Edit</button>
              <button type="button" class="btn btn-sm btn-outline-danger">Delete</button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

</div>
